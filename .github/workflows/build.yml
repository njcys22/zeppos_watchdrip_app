name: Build ZeppOS App

on:
  push:
    branches: [ main, master ]  
  pull_request:
    branches: [ main, master ]  
jobs:
  build:
    runs-on: ubuntu-latest 

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  

      
      - name: Install dependencies
        run: npm install

     
      - name: Build project
        run: npm run build  # 或使用 zeus build 等 ZeppOS 特定命令
