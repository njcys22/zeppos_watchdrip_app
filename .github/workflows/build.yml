name: Build ZeppOS App
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build with Gradle
      run: |
        export storePassword=${{ secrets.STORE_PASSWORD }}
        export keyAlias=${{ secrets.KEY_ALIAS }}
        export keyPassword=${{ secrets.KEY_PASSWORD }}
        export storeFile=${{ secrets.STORE_FILE }}
        ./gradlew assembleFullRelease \
        -Dorg.gradle.jvmargs="-Xmx8g -XX:+UseParallelGC -Xss1024m" \
        -Dkotlin.daemon.jvm.options="-Xmx2g" \
        -Dkotlin.compiler.execution.strategy="in-process" \
        -Dorg.gradle.daemon=true \
        -Dorg.gradle.workers.max=8 \
        -Dorg.gradle.caching=true \
    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ZeppOS App
        path: app/build/outputs/apk/full/release
